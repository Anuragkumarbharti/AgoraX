name: agorax
description: AgoraX - Learn, Discuss, and Connect Through Voice Communities
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  
  # UI & Navigation
  google_fonts: ^8.1.0
  get: ^4.6.6
  flutter_svg: ^2.0.0
  
  # State Management
  provider: ^6.1.0
  
  # API & Networking
  dio: ^5.4.0
  retrofit: ^4.1.0
  
  # JSON Serialization
  json_serializable: ^6.7.1
  
  # Local Storage
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  
  # ZEGOCLOUD SDK for Voice
  zego_uikit: ^2.29.1
  zego_uikit_prebuilt_call: ^4.24.2
  
  # WebRTC
  flutter_webrtc: ^1.5.2
  
  # Real-time
  web_socket_channel: ^3.0.3
  
  # Firebase for notifications
  firebase_core: ^4.11.0
  firebase_messaging: ^16.4.1
  
  # Image handling
  image_picker: ^1.0.7
  cached_network_image: ^3.3.1
  
  # Payments
  razorpay_flutter: ^1.3.7
  crypto: ^3.0.3
  
  # Permissions
  permission_handler: ^12.0.3
  
  # Analytics
  firebase_analytics: ^12.4.3
  
  # Video & Audio
  video_player: ^2.8.6
  record: ^6.2.1
  audio_waveforms: ^2.0.2
  
  # Time & Date
  intl: ^0.20.2
  
  # Loading & shimmer
  shimmer: ^3.0.0
  
  # Pull to refresh
  pull_to_refresh: ^2.0.0
  
  # Bottom sheet
  modal_bottom_sheet: ^3.0.0
  
  # Connectivity
  connectivity_plus: ^6.1.5
  
  # Local Preferences (first launch tracking)
  shared_preferences: ^2.3.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  
  flutter_lints: ^6.0.0
  build_runner: ^2.4.8
  retrofit_generator: ^10.2.7
  json_annotation: ^4.8.1

flutter:
  uses-material-design: true
  
  assets:
    - assets/images/
